networks:
  redpanda_net:
    driver: bridge

volumes:
  redpanda_data: {}

services:
  redpanda:
    image: redpandadata/redpanda:v24.2.9
    container_name: redpanda
    networks:
      - redpanda_net
    ports:
      - "9092:9092"   # Kafka API
      - "9644:9644"   # Admin API
      - "18082:18082" # HTTP Proxy (Pandaproxy)
      - "18081:18081" # Schema Registry
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:9092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:9092
      - --pandaproxy-addr internal://0.0.0.0:18082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:18082,external://localhost:18082
      - --schema-registry-addr internal://0.0.0.0:18081,external://0.0.0.0:18081
      - --rpc-addr redpanda:33145
      - --advertise-rpc-addr redpanda:33145
      - --smp 1
      - --memory 1G
      - --mode dev-container
      - --default-log-level=info
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -E 'Healthy:.+true' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  console:
    image: redpandadata/console:v2.7.2
    container_name: redpanda-console
    networks:
      - redpanda_net
    ports:
      - "8080:8080"
    environment:
      CONFIG_FILEPATH: /tmp/config.yml
    volumes:
      - ./console-config.yaml:/tmp/config.yml:ro
    depends_on:
      redpanda:
        condition: service_healthy
