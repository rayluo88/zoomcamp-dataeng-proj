deployment:
  basePath: /zoomcamp-dataeng-proj

appearance:
  default: light
  switcher: false

theme:
  colorPalettes:
    default:
      light:
        - "#C23D2E"
        - "#2B6B5E"
        - "#4A7FB5"
        - "#D4890A"
        - "#7B6B8A"
        - "#C4956A"
        - "#5B8A72"
        - "#8C8279"
  colorScales:
    default:
      light:
        - "#f5d0cc"
        - "#C23D2E"
  colors:
    primary:
      light: "#C23D2E"
    accent:
      light: "#D4890A"
    info:
      light: "#4A7FB5"
    positive:
      light: "#2B6B5E"
    warning:
      light: "#D4890A"
    negative:
      light: "#C23D2E"

plugins:
  components:
    # This loads all of evidence's core charts and UI components
    # You probably don't want to edit this dependency unless you know what you are doing
    "@evidence-dev/core-components": {}

  datasources:
    # You can add additional datasources here by adding npm packages. 
    # Make to also add them to `package.json`.
    "@evidence-dev/bigquery": { }
    "@evidence-dev/csv": { }
    "@evidence-dev/databricks": { }
    "@evidence-dev/duckdb": { }
    "@evidence-dev/mssql": { }
    "@evidence-dev/mysql": { }
    "@evidence-dev/postgres": { }
    "@evidence-dev/source-javascript": { }
    "@evidence-dev/snowflake": { }
    "@evidence-dev/sqlite": { }
    "@evidence-dev/trino": { }
    "@evidence-dev/motherduck": { }
